<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicoPro2703 | Mi Portal</title>
    
    <link rel="icon" type="image/png" href="ninja-head-mascot-logo-for-esport-ninja-t-shirt-design-ninja-logo-ninja-sticker-vector.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff007f; /* Rosa Eléctrico */
            --secondary: #ae00ff; /* Morado */
            --bg: #050505;
            --danger: #ff4444; /* Rojo para acciones destructivas */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            perspective: 1000px;
        }

        /* Fondo Limpio */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('Sin título.jpg') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.25);
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            transform-style: preserve-3d;
        }

        .card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 127, 0.2);
            border-radius: 30px;
            padding: 50px 30px 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            transition: transform 0.1s ease-out;
        }

        .avatar {
            width: 130px;
            height: 130px;
            margin: -100px auto 20px;
        }

        .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--secondary);
        }

        .tagline {
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 35px;
        }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn span {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn i { 
            font-size: 1.3rem; 
            color: var(--primary); 
            width: 20px;
            text-align: center;
        }

        .btn:hover {
            background: rgba(255, 0, 127, 0.15);
            border-color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* --- ESTILOS DEL BOTÓN Y MODAL DE JUEGOS --- */
        .game-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 15, 0.8);
            border: 2px solid var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-trigger:hover {
            transform: scale(1.05);
            background: var(--primary);
            box-shadow: 0 0 25px var(--primary);
        }

        .game-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover { color: var(--primary); }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        /* Formularios y Cajas */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-field {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            box-shadow: 0 0 15px var(--primary);
        }

        .switch-link {
            font-size: 0.85rem;
            color: var(--secondary);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
            display: inline-block;
        }

        /* Area del Juego */
        .click-target {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 20px var(--primary);
            transition: transform 0.05s;
        }

        .click-target:active {
            transform: scale(0.95);
        }

        /* Tabla de Clasificación */
        .leaderboard {
            margin-top: 20px;
            text-align: left;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .leaderboard h4 {
            font-family: 'Orbitron', sans-serif;
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        /* Botón para eliminar cuenta */
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .delete-btn:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px var(--danger);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- BOTÓN ESQUINA SUPERIOR DERECHA -->
    <button class="game-trigger" onclick="toggleGameModal()">
        <i class="fas fa-gamepad"></i> JUEGOS
    </button>

    <!-- VENTANA EMERGENTE (MODAL DE JUEGOS) -->
    <div class="game-modal" id="gameModal">
        <div class="game-box">
            <span class="close-btn" onclick="toggleGameModal()">&times;</span>
            
            <!-- VISTA 1: REGISTRO / LOGIN -->
            <div id="authSection">
                <h3 class="game-title" id="authTitle">INICIAR SESIÓN</h3>
                
                <div class="form-group">
                    <input type="text" id="username" class="input-field" placeholder="Nombre de usuario">
                    <input type="password" id="password" class="input-field" placeholder="Contraseña">
                    <button class="action-btn" id="authBtn" onclick="handleAuth()">ENTRAR</button>
                </div>

                <p id="authError" style="color: #ff4444; font-size: 0.8rem; min-height: 18px;"></p>

                <span class="switch-link" id="authSwitch" onclick="switchAuthMode()">¿No tienes cuenta? Regístrate aquí</span>
            </div>

            <!-- VISTA 2: PANEL DE JUEGO -->
            <div id="gameSection" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-size: 0.9rem;">Jugador: <strong id="playerTag" style="color:var(--primary);"></strong></span>
                    <div>
                        <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer; font-size:0.8rem; margin-right: 8px;"><i class="fas fa-sign-out-alt"></i> Salir</button>
                        <button onclick="deleteAccount()" class="delete-btn"><i class="fas fa-trash-alt"></i> Eliminar Cuenta</button>
                    </div>
                </div>

                <h3 class="game-title">CLICKER NEÓN (10s)</h3>
                
                <div style="display:flex; justify-content:space-around; font-family:'Orbitron';">
                    <div>PUNTOS: <span id="score">0</span></div>
                    <div>TIEMPO: <span id="timer">10</span>s</div>
                </div>

                <div class="click-target" id="clickBtn" onclick="registerClick()">
                    ¡HAZ CLICK!
                </div>

                <button class="action-btn" id="startBtn" onclick="startGame()" style="width:100%;">COMENZAR</button>

                <!-- TABLA DE CLASIFICACIÓN -->
                <div class="leaderboard">
                    <h4><i class="fas fa-trophy" style="color:gold;"></i> CLASIFICACIÓN</h4>
                    <div id="leaderboardContent">
                        <!-- Se llena con JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="bg-animation"></div>

    <div class="card-container" id="tiltCard">
        <div class="card">
            <div class="avatar">
                <img src="ninja-head-mascot-logo-for-esport-ninja-t-shirt-design-ninja-logo-ninja-sticker-vector.jpg" alt="NicoPro2703">
            </div>

            <h1>NicoPro2703</h1>
            <div class="tagline">En camino al éxito</div>

            <div class="links">
                <a href="https://youtube.com/@NicoPro2703" target="_blank" class="btn">
                    <span><i class="fab fa-youtube"></i> YouTube</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://www.twitch.tv/nicopro2703_" target="_blank" class="btn">
                    <span><i class="fab fa-twitch"></i> Twitch</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://kick.com/nicopro2703" target="_blank" class="btn">
                    <span><i class="fa-solid fa-k"></i> Kick</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://www.tiktok.com/@nicopro2703" target="_blank" class="btn">
                    <span><i class="fab fa-tiktok"></i> TikTok</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://x.com/NicoPro2703" target="_blank" class="btn">
                    <span><i class="fab fa-x-twitter"></i> Twitter</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://discord.gg/Hsvse4hYuD" target="_blank" class="btn">
                    <span><i class="fab fa-discord"></i> Discord</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://whatsapp.com/channel/0029Vb89qKO302TGmx3BN200" target="_blank" class="btn">
                    <span><i class="fab fa-whatsapp"></i> Canal WhatsApp</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>

                <a href="https://roblox.com/es/users/1635775705/profile" target="_blank" class="btn">
                    <span><i class="fas fa-gamepad"></i> Roblox</span>
                    <i class="fas fa-chevron-right" style="opacity:0.3"></i>
                </a>
            </div>

            <div class="footer">
                © 2026 NICOPRO2703
            </div>
        </div>
    </div>

    <script>
        // --- EFECTO INCLINACIÓN (TILT) ---
        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // --- LÓGICA DEL SCRIPT DE JUEGOS Y CUENTAS ---
        let isRegisterMode = false;
        let currentUser = null;
        let score = 0;
        let timeLeft = 10;
        let gameInterval = null;
        let isPlaying = false;

        function toggleGameModal() {
            const modal = document.getElementById('gameModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            checkSession();
        }

        function switchAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? 'CREAR CUENTA' : 'INICIAR SESIÓN';
            document.getElementById('authBtn').innerText = isRegisterMode ? 'REGISTRARSE' : 'ENTRAR';
            document.getElementById('authSwitch').innerText = isRegisterMode ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate aquí';
            document.getElementById('authError').innerText = '';
        }

        function getUsers() {
            return JSON.parse(localStorage.getItem('np_users') || '{}');
        }

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorElement = document.getElementById('authError');

            if (!user || !pass) {
                errorElement.innerText = 'Rellena todos los campos';
                return;
            }

            const users = getUsers();

            if (isRegisterMode) {
                if (users[user]) {
                    errorElement.innerText = 'El usuario ya existe';
                    return;
                }
                users[user] = { password: pass, highScore: 0 };
                localStorage.setItem('np_users', JSON.stringify(users));
                loginUser(user);
            } else {
                if (!users[user] || users[user].password !== pass) {
                    errorElement.innerText = 'Usuario o contraseña incorrectos';
                    return;
                }
                loginUser(user);
            }
        }

        function loginUser(username) {
            currentUser = username;
            localStorage.setItem('np_session', username);
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('authError').innerText = '';
            checkSession();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('np_session');
            checkSession();
        }

        // --- NUEVA FUNCIÓN: ELIMINAR CUENTA ---
        function deleteAccount() {
            if (!currentUser) return;

            const confirmDelete = confirm(`¿Estás seguro de que deseas eliminar la cuenta "${currentUser}"? Se borra permanentemente de la clasificación.`);
            
            if (confirmDelete) {
                const users = getUsers();
                delete users[currentUser]; // Elimina la clave del objeto
                localStorage.setItem('np_users', JSON.stringify(users)); // Guarda la lista actualizada
                
                logout(); // Cierra la sesión activa y refresca las vistas
            }
        }

        function checkSession() {
            const session = localStorage.getItem('np_session');
            if (session) {
                currentUser = session;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('gameSection').classList.remove('hidden');
                document.getElementById('playerTag').innerText = currentUser;
                updateLeaderboard();
            } else {
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('gameSection').classList.add('hidden');
            }
        }

        // --- SISTEMA DEL MINIJUEGO ---
        function startGame() {
            if (isPlaying) return;
            
            score = 0;
            timeLeft = 10;
            isPlaying = true;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('startBtn').innerText = '¡JUGANDO!';
            document.getElementById('startBtn').disabled = true;

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    isPlaying = false;
                    document.getElementById('startBtn').innerText = 'JUGAR DE NUEVO';
                    document.getElementById('startBtn').disabled = false;
                    saveScore(score);
                }
            }, 1000);
        }

        function registerClick() {
            if (isPlaying) {
                score++;
                document.getElementById('score').innerText = score;
            }
        }

        function saveScore(finalScore) {
            const users = getUsers();
            if (users[currentUser]) {
                if (finalScore > (users[currentUser].highScore || 0)) {
                    users[currentUser].highScore = finalScore;
                    localStorage.setItem('np_users', JSON.stringify(users));
                    alert(`¡Nuevo récord personal: ${finalScore} clics!`);
                } else {
                    alert(`Tiempo agotado. Tu puntuación: ${finalScore}`);
                }
            }
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const users = getUsers();
            const leaderboardList = [];

            for (let user in users) {
                leaderboardList.push({
                    name: user,
                    score: users[user].highScore || 0
                });
            }

            // Ordenar de mayor a menor puntuación
            leaderboardList.sort((a, b) => b.score - a.score);

            const container = document.getElementById('leaderboardContent');
            container.innerHTML = '';

            if (leaderboardList.length === 0) {
                container.innerHTML = '<div style="color:#888;">Sin puntuaciones aún.</div>';
                return;
            }

            leaderboardList.forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = 'leaderboard-row';
                row.innerHTML = `
                    <span>#${index + 1} <strong>${entry.name}</strong></span>
                    <span style="color:var(--primary); font-family:'Orbitron';">${entry.score} pts</span>
                `;
                container.appendChild(row);
            });
        }
    </script>

</body>
</html>
